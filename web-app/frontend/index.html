<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Insurance Analysis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Prism Insurance Analysis</h1>
            <p>Analyze and visualize insurance data with AI-powered insights</p>
        </header>
        
        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="switchTab('analyze')">🔍 Analyze Data</button>
        </nav>
        
        <main>
            <!-- Power BI Dashboard Tab -->
            <section id="dashboard-tab" class="tab-content active">
                <h2>Power BI Dashboard</h2>
                <div class="powerbi-container">
                    <iframe title="Prism Insurance Analysis" 
                            width="100%" 
                            height="700" 
                            src="https://app.powerbi.com/reportEmbed?reportId=b3a36a22-82e4-4729-9235-eebb2faa4ad6&autoAuth=true&ctid=0ecde1b1-6118-4880-9c6b-491c76d96b71" 
                            frameborder="0" 
                            allowFullScreen="true">
                    </iframe>
                </div>
            </section>

            <!-- Data Analysis Tab -->
            <section id="analyze-tab" class="tab-content">
                <h2>Upload & Analyze Insurance Data</h2>
                <div class="upload-section">
                    <input type="file" id="fileInput" accept=".csv" />
                    <button id="uploadBtn">Upload & Analyze</button>
                </div>
                
                <section class="results-section" id="resultsSection" style="display:none;">
                    <h2>Analysis Results</h2>
                    <div id="resultsContent"></div>
                </section>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 Prism Insurance Analysis. All rights reserved.</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
